<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Lounge - Терминал Официанта</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1E1E1E;
            --primary: #E05A33;
            --text: #FFFFFF;
            --text-muted: #A0A0A0;
            --border: #2C2C2C;
            --status-pending: #F39C12;
            --status-confirmed: #3498DB;
        }

        body { font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* Экран входа */
        .login-container { background: var(--card); padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; margin: 10vh auto; }
        .login-container h2 { margin-top: 0; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box; font-size: 1rem; background: #2C2C2C; color: white; transition: 0.2s; }
        input:focus { outline: none; border-color: var(--primary); }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .error-msg { color: #E74C3C; font-size: 0.9rem; margin-top: 10px; display: none; }

        /* Дашборд Кухни */
        .kitchen-container { display: none; max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .header h1 { margin: 0; font-size: 1.8rem; }
        .header .pulse { display: inline-block; width: 10px; height: 10px; background-color: #2ECC71; border-radius: 50%; margin-right: 10px; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .logout-btn { background: #2C2C2C; width: auto; padding: 10px 20px; }

        .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .order-card { background: var(--card); border-radius: 16px; padding: 20px; border-top: 4px solid var(--border); display: flex; flex-direction: column; }
        .order-card.pending { border-top-color: var(--status-pending); }
        .order-card.confirmed { border-top-color: var(--status-confirmed); }
        
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .table-badge { background: #2C2C2C; padding: 5px 12px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; }
        .order-time { color: var(--text-muted); font-size: 0.9rem; }
        
        .order-items { flex-grow: 1; margin-bottom: 20px; }
        .item-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1.05rem; padding-bottom: 8px; border-bottom: 1px dashed #2C2C2C; }
        .item-row:last-child { border-bottom: none; }
        .item-qty { font-weight: bold; color: var(--primary); margin-right: 10px; }
        
        .order-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border); }
        .order-total { font-weight: bold; font-size: 1.2rem; }
        
        .action-btn { width: auto; padding: 10px 20px; border-radius: 8px; }
        .btn-confirm { background: var(--status-pending); }
        .btn-complete { background: var(--status-confirmed); }
        
        .empty-state { text-align: center; color: var(--text-muted); padding: 50px; font-size: 1.2rem; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <div class="login-container" id="loginScreen">
        <h2>Терминал Персонала</h2>
        <input type="text" id="username" placeholder="Логин (waiter)">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <div class="error-msg" id="loginError">Неверный логин или пароль</div>
    </div>

    <div class="kitchen-container" id="kitchenPanel">
        <div class="header">
            <h1><span class="pulse"></span>Активные заказы</h1>
            <button class="logout-btn" onclick="logout()">Смена закрыта</button>
        </div>
        <div class="orders-grid" id="ordersGrid">
            </div>
    </div>

    <script>
        const API_URL = 'https://kali.pythonanywhere.com/api';
        let fetchInterval;

        // Авторизация
        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const err = document.getElementById('loginError');
            err.style.display = 'none';

            if (!user || !pass) { err.innerText = "Заполните все поля!"; err.style.display = 'block'; return; }

            try {
                const res = await fetch(`${API_URL}/staff/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();
                
                // Пускаем и админа, и официанта/кухню
                if (res.ok && data.success) {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('kitchenPanel').style.display = 'block';
                    loadOrders();
                    // Запускаем автообновление каждые 3 секунды
                    fetchInterval = setInterval(loadOrders, 3000);
                } else {
                    err.innerText = data.message || "Доступ запрещен.";
                    err.style.display = 'block';
                }
            } catch (e) { err.innerText = "Ошибка сервера."; err.style.display = 'block'; }
        }

        function logout() {
            clearInterval(fetchInterval);
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('kitchenPanel').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'block';
        }

        // Загрузка заказов
        async function loadOrders() {
            try {
                const res = await fetch(`${API_URL}/orders`);
                const orders = await res.json();
                renderOrders(orders);
            } catch (e) {
                console.error("Ошибка загрузки заказов:", e);
            }
        }

        function renderOrders(orders) {
            const grid = document.getElementById('ordersGrid');
            
            if (orders.length === 0) {
                grid.innerHTML = '<div class="empty-state">Заказов пока нет, можно отдохнуть ☕</div>';
                return;
            }

            let html = '';
            orders.forEach(order => {
                // Извлекаем время из таймстемпа (например, из "2026-05-31 14:22:10" берем "14:22")
                const timeStr = order.created_at.split(' ')[1].substring(0, 5);
                
                let itemsHtml = '';
                order.items.forEach(item => {
                    itemsHtml += `
                        <div class="item-row">
                            <span><span class="item-qty">${item.qty}x</span> ${item.name}</span>
                        </div>
                    `;
                });

                // Кнопки зависят от статуса
                let actionBtn = '';
                if (order.status === 'pending') {
                    actionBtn = `<button class="action-btn btn-confirm" onclick="updateOrderStatus(${order.id}, 'confirmed')">Подтвердить</button>`;
                } else if (order.status === 'confirmed') {
                    actionBtn = `<button class="action-btn btn-complete" onclick="updateOrderStatus(${order.id}, 'completed')">Завершить</button>`;
                }

                html += `
                    <div class="order-card ${order.status}">
                        <div class="order-header">
                            <div class="table-badge">Стол ${order.table_number}</div>
                            <div class="order-time">#${order.id} • ${timeStr}</div>
                        </div>
                        <div class="order-items">
                            ${itemsHtml}
                        </div>
                        <div class="order-footer">
                            <div class="order-total">${order.total_price} ₸</div>
                            ${actionBtn}
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        async function updateOrderStatus(orderId, newStatus) {
            try {
                const res = await fetch(`${API_URL}/orders/${orderId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                if (res.ok) {
                    loadOrders(); // Мгновенно обновляем экран
                }
            } catch (e) {
                alert("Ошибка при обновлении статуса.");
            }
        }
    </script>
</body>
</html>
