<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberChat 2.5 Pro</title>
    <style>
        :root { --bg-color: #0a0a0c; --card-bg: #16161a; --accent: #00f2ff; --text: #e0e0e0; --msg-me: #0052cc; --msg-other: #2a2a32; }
        body { background-color: var(--bg-color); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; user-select: none; }
        .window { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid #2d2d35; width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative; }
        h2 { color: var(--accent); margin-top: 0; text-align: center; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; }
        .input-group input, .input-group textarea { width: 100%; padding: 10px; background: #222227; border: 1px solid #33333b; border-radius: 8px; color: white; box-sizing: border-box; }
        .input-group textarea { resize: none; height: 80px; font-family: inherit; }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--accent); outline: none; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: #000; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        button:hover { box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        .link-btn { background: none; color: #00a2ff; font-weight: normal; font-size: 0.9rem; margin-top: 15px; text-decoration: underline; }
        .hidden { display: none !important; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-btn { background: #ff3333; color: white; width: auto; padding: 6px 12px; font-size: 0.85rem; border-radius: 6px; }
        .logout-btn:hover { box-shadow: 0 0 10px rgba(255, 51, 51, 0.4); }
        .nav-btn { background: #333; color: white; width: auto; padding: 8px 15px; font-size: 0.9rem; margin-bottom: 15px; }

        .status-text { font-size: 0.8rem; color: #888; margin-top: 2px; display: block; }

        /* Список чатов */
        .chat-list { background: #1c1c22; border-radius: 10px; padding: 10px; max-height: 150px; overflow-y: auto; border: 1px solid #2d2d35; margin-top: 10px; }
        .chat-list-item { display: flex; flex-direction: column; padding: 10px; cursor: pointer; border-bottom: 1px solid #2d2d35; }
        .chat-list-item:hover { background: #2d2d35; color: var(--accent); }
        .chat-item-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }

        .search-results { background: #222227; border-radius: 8px; max-height: 100px; overflow-y: auto; margin-top: -15px; margin-bottom: 15px; padding: 5px; }
        .search-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; cursor: pointer; }
        .search-item:hover { background: #33333b; color: var(--accent); }

        /* Чат бокс и сообщения с анимацией схлопывания */
        .msg-box { background: #222227; height: 230px; border-radius: 8px; padding: 15px; margin-bottom: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; border: 1px solid #2d2d35; position: relative; }
        .msg-container { display: flex; align-items: center; gap: 5px; max-width: 75%; width: fit-content; transition: all 0.4s ease-out; max-height: 100px; opacity: 1; transform: scale(1); }
        .msg-container.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-container.other { align-self: flex-start; flex-direction: row; }
        
        /* Класс анимации удаления */
        .msg-container.deleted-anim { max-height: 0 !important; opacity: 0 !important; padding: 0 !important; margin: 0 !important; transform: scale(0.1) translateX(100px); overflow: hidden; }

        .msg { padding: 8px 12px; border-radius: 12px; position: relative; width: fit-content; display: flex; flex-direction: column; }
        .msg-container.me .msg { background: var(--msg-me); color: white; border-bottom-right-radius: 2px; }
        .msg-container.other .msg { background: var(--msg-other); color: white; border-bottom-left-radius: 2px; }
        .msg .time { font-size: 0.65rem; opacity: 0.5; align-self: flex-end; margin-top: 4px; }
        
        /* Три точки ⋮ */
        .msg-menu-btn { cursor: pointer; opacity: 0; color: #888; font-weight: bold; padding: 0 5px; transition: 0.2s; font-size: 1.1rem; }
        .msg-container:hover .msg-menu-btn { opacity: 1; }
        
        /* Выпадающее меню */
        .context-menu { position: absolute; background: #22222a; border: 1px solid #444; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 1000; display: none; overflow: hidden; }
        .context-menu-item { padding: 10px 15px; cursor: pointer; font-size: 0.9rem; color: white; transition: 0.2s; }
        .context-menu-item:hover { background: var(--accent); color: black; font-weight: bold; }
        .context-menu-item.delete { color: #ff5555; }
        .context-menu-item.delete:hover { background: #ff5555; color: white; }

        .clickable-title { cursor: pointer; display: inline-block; margin: 0; }
        .clickable-title:hover { color: #00f2ff; text-decoration: underline; }
        .typing-text { font-size: 0.85rem; color: #00ff66; font-style: italic; margin-bottom: 5px; min-height: 20px;}
    </style>
</head>
<body onclick="hideContextMenu()">

    <div id="customContextMenu" class="context-menu"></div>

    <div id="loginWindow" class="window">
        <h2>Войти в CyberChat</h2>
        <div class="input-group">
            <label>Никнейм</label>
            <input type="text" id="loginUsername" placeholder="Введите ник" onkeydown="if(event.key==='Enter') document.getElementById('loginPassword').focus()">
        </div>
        <div class="input-group">
            <label>Пароль</label>
            <input type="password" id="loginPassword" placeholder="Введите пароль" onkeydown="if(event.key==='Enter') tryLogin()">
        </div>
        <button onclick="tryLogin()">Логин</button>
        <button class="link-btn" onclick="switchWindow('registerWindow')">У вас нет аккаунта? Зарегистрируйтесь</button>
    </div>

    <div id="registerWindow" class="window hidden">
        <h2>Регистрация</h2>
        <div class="input-group">
            <label>Придумайте никнейм</label>
            <input type="text" id="regUsername" placeholder="Минимум 3 символа" onkeydown="if(event.key==='Enter') document.getElementById('regPassword').focus()">
        </div>
        <div class="input-group">
            <label>Придумайте пароль</label>
            <input type="password" id="regPassword" placeholder="Надежный пароль" onkeydown="if(event.key==='Enter') tryRegister()">
        </div>
        <button onclick="tryRegister()">Зарегистрироваться</button>
        <button class="link-btn" onclick="switchWindow('loginWindow')">Уже есть аккаунт? Войти</button>
    </div>

    <div id="searchWindow" class="window hidden">
        <div class="top-bar">
            <span>Вы: <b id="myUsername" style="color: #ff8a00; cursor:pointer;" onclick="openMyProfile()">...</b></span>
            <button class="logout-btn" onclick="confirmLogout()">Выйти</button>
        </div>
        
        <h2>Поиск собеседника</h2>
        <div class="input-group">
            <input type="text" id="searchBar" oninput="searchUser()" placeholder="Введите никнейм...">
        </div>
        <div id="searchResults" class="search-results hidden"></div>

        <h3 style="font-size: 1rem; color: #888; margin-bottom: 5px;">Ваши чаты:</h3>
        <div id="activeChatsBox" class="chat-list"></div>
    </div>

    <div id="chatWindow" class="window hidden" style="width: 500px;">
        <button class="nav-btn" onclick="backToSearch()">← Назад</button>
        
        <div style="margin-bottom: 10px;">
            <h3 id="chatWithTitle" class="clickable-title" onclick="openTargetProfile()">Чат с: ...</h3>
            <span id="chatUserLastSeen" class="status-text">...</span>
        </div>
        
        <div id="typingIndicator" class="typing-text"></div>

        <div id="msgBox" class="msg-box"></div>

        <div style="display: flex; gap: 10px;">
            <input type="text" id="msgInput" style="flex-grow: 1; background: #222227; border: 1px solid #333; border-radius: 8px; padding: 10px; color: white;" placeholder="Напишите сообщение..." onkeydown="if(event.key==='Enter') sendMessage()" oninput="sendTypingStatus(true)">
            <button onclick="sendMessage()" style="width: auto; padding: 10px 20px;">Отправить</button>
        </div>
    </div>

    <div id="profileWindow" class="window hidden">
        <button class="nav-btn" id="profileBackBtn" onclick="closeProfile()">← Назад</button>
        <h2 id="profileTitle" style="margin-bottom:2px;">...</h2>
        <span id="profileLastSeen" class="status-text" style="text-align:center; margin-bottom:15px;">...</span>
        
        <div class="input-group">
            <label>Описание (О себе):</label>
            <textarea id="profileAbout" placeholder="Расскажите о себе..."></textarea>
        </div>
        
        <button id="saveProfileBtn" onclick="saveProfile()">Сохранить изменения</button>
    </div>

    <script>
        let myName = "";
        let activeChatUser = "";
        let previousWindow = "";
        let totalMessagesCount = 0;
        let typingTimeout = null;

        function playNotificationSound() {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const osc = context.createOscillator();
                const gain = context.createGain();
                osc.type = "sine";
                osc.frequency.setValueAtTime(600, context.currentTime); 
                gain.gain.setValueAtTime(0.06, context.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, context.currentTime + 0.12);
                osc.connect(gain);
                gain.connect(context.destination);
                osc.start();
                osc.stop(context.currentTime + 0.12);
            } catch(e) { console.log("Ошибка аудио:", e); }
        }

        function switchWindow(windowId) {
            document.getElementById('loginWindow').classList.add('hidden');
            document.getElementById('registerWindow').classList.add('hidden');
            document.getElementById('searchWindow').classList.add('hidden');
            document.getElementById('chatWindow').classList.add('hidden');
            document.getElementById('profileWindow').classList.add('hidden');
            document.getElementById(windowId).classList.remove('hidden');
        }

        async function confirmLogout() {
            if (confirm("Вы точно хотите выйти из аккаунта?")) {
                await fetch('https://kali.pythonanywhere.com/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: myName })
                });
                myName = "";
                activeChatUser = "";
                if (window.chatInterval) clearInterval(window.chatInterval);
                if (window.mainInterval) clearInterval(window.mainInterval);
                switchWindow('loginWindow');
            }
        }

        function backToSearch() {
            if (window.chatInterval) clearInterval(window.chatInterval);
            sendTypingStatus(false);
            activeChatUser = "";
            switchWindow('searchWindow');
            loadActiveChats();
        }

        async function tryRegister() {
            const u = document.getElementById('regUsername').value;
            const p = document.getElementById('regPassword').value;
            const res = await fetch('https://kali.pythonanywhere.com/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();
            alert(data.message);
            if (data.success) switchWindow('loginWindow');
        }

        async function tryLogin() {
            const u = document.getElementById('loginUsername').value;
            const p = document.getElementById('loginPassword').value;
            const res = await fetch('https://kali.pythonanywhere.com/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();
            if (data.success) {
                myName = data.username;
                document.getElementById('myUsername').innerText = myName;
                switchWindow('searchWindow');
                loadActiveChats();
                window.mainInterval = setInterval(loadActiveChats, 5000);
            } else {
                alert(data.message);
            }
        }

        async function searchUser() {
            const query = document.getElementById('searchBar').value;
            const box = document.getElementById('searchResults');
            if (!query) { box.classList.add('hidden'); return; }
            
            const res = await fetch(`https://kali.pythonanywhere.com/search?username=${query}`);
            const users = await res.json();
            
            box.innerHTML = "";
            if(users.length > 0) {
                box.classList.remove('hidden');
                users.forEach(u => {
                    if(u.username !== myName) {
                        let div = document.createElement('div');
                        div.className = "search-item";
                        div.innerHTML = `<div><b>${u.username}</b><br><small style="color:#666">${u.last_seen_str}</small></div>`;
                        div.onclick = () => { startChat(u.username); box.classList.add('hidden'); document.getElementById('searchBar').value=""; };
                        box.appendChild(div);
                    }
                });
            } else {
                box.classList.add('hidden');
            }
        }

        async function loadActiveChats() {
            const res = await fetch(`https://kali.pythonanywhere.com/active_chats?username=${myName}`);
            const chats = await res.json();
            const box = document.getElementById('activeChatsBox');
            box.innerHTML = "";
            
            if(chats.length === 0) {
                box.innerHTML = `<p style="color:#444; text-align:center; font-size:0.9rem;">Нет активных диалогов</p>`;
                return;
            }

            chats.forEach(c => {
                let div = document.createElement('div');
                div.className = "chat-list-item";
                div.innerHTML = `
                    <div class="chat-item-header">
                        <span>💬 ${c.chat_user}</span>
                        <span style="font-size:0.75rem; color:${c.last_seen_str==='В сети'?'#00ff66':'#666'}">${c.last_seen_str==='В сети'?'• онлайн':''}</span>
                    </div>
                    <small style="color:#555; margin-top:3px;">${c.last_seen_str !== 'В сети' ? c.last_seen_str : 'Сейчас общается'}</small>
                `;
                div.onclick = () => startChat(c.chat_user);
                box.appendChild(div);
            });
        }

        function startChat(username) {
            activeChatUser = username;
            document.getElementById('chatWithTitle').innerText = `Чат с: ${username}`;
            switchWindow('chatWindow');
            totalMessagesCount = -1; 
            loadMessages();
            
            if (window.chatInterval) clearInterval(window.chatInterval);
            window.chatInterval = setInterval(loadMessages, 2000); 
        }

        async function sendTypingStatus(isTyping) {
            await fetch('https://kali.pythonanywhere.com/typing', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: myName, typing_to: isTyping ? activeChatUser : null })
            });
            if (isTyping) {
                if (typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => sendTypingStatus(false), 2000);
            }
        }

        async function sendMessage() {
            const text = document.getElementById('msgInput').value;
            if(!text || !activeChatUser) return;

            if (typingTimeout) clearTimeout(typingTimeout);
            await sendTypingStatus(false);

            await fetch('https://kali.pythonanywhere.com/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sender: myName, receiver: activeChatUser, text: text })
            });
            document.getElementById('msgInput').value = "";
            loadMessages();
        }

        async function loadMessages() {
            if(!activeChatUser) return;
            const res = await fetch(`https://kali.pythonanywhere.com/messages?sender=${myName}&receiver=${activeChatUser}`);
            const data = await res.json();
            
            document.getElementById('chatUserLastSeen').innerText = data.last_seen_str;
            document.getElementById('typingIndicator').innerText = data.is_typing ? `${activeChatUser} печатает...` : "";

            const messages = data.messages;
            
            if (totalMessagesCount !== -1 && messages.length > totalMessagesCount) {
                if (messages[messages.length - 1].sender !== myName) {
                    playNotificationSound();
                }
            }
            totalMessagesCount = messages.length;

            const box = document.getElementById('msgBox');
            box.innerHTML = "";
            
            messages.forEach(m => {
                let container = document.createElement('div');
                container.className = `msg-container ${m.sender === myName ? 'me' : 'other'}`;
                container.id = `msg-block-${m.id}`;
                
                let msgDiv = document.createElement('div');
                msgDiv.className = 'msg';
                msgDiv.innerHTML = `<span>${m.text_message}</span><span class="time">${m.time_str}</span>`;
                
                let menuBtn = document.createElement('div');
                menuBtn.className = 'msg-menu-btn';
                menuBtn.innerText = '⋮';
                menuBtn.onclick = (e) => showThreePointsMenu(e, m.id, m.sender === myName);
                
                container.appendChild(msgDiv);
                container.appendChild(menuBtn);
                box.appendChild(container);
            });
            box.scrollTop = box.scrollHeight;
        }

        function showThreePointsMenu(event, msgId, isMe) {
            event.stopPropagation(); 
            const menu = document.getElementById('customContextMenu');
            menu.style.display = 'block';
            menu.style.left = `${event.clientX - 50}px`;
            menu.style.top = `${event.clientY + 10}px`;
            
            if (isMe) {
                menu.innerHTML = `<div class="context-menu-item delete" onclick="triggerDeleteMessage(${msgId})">Удалить сообщение</div>`;
            } else {
                menu.innerHTML = `<div class="context-menu-item" onclick="triggerReportMessage()">Пожаловаться</div>`;
            }
        }

        function hideContextMenu() {
            document.getElementById('customContextMenu').style.display = 'none';
        }

        async function triggerDeleteMessage(msgId) {
            if (confirm("Вы точно хотите удалить это сообщение для всех?")) {
                const block = document.getElementById(`msg-block-${msgId}`);
                if (block) {
                    block.classList.add('deleted-anim');
                }
                
                await fetch('https://kali.pythonanywhere.com/delete_message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message_id: msgId, username: myName })
                });
                
                setTimeout(loadMessages, 400);
            }
        }

        function triggerReportMessage() {
            alert("Жалоба успешно отправлена модераторам сети CyberChat! Спасибо за бдительность.");
        }

        async function openMyProfile() {
            previousWindow = "searchWindow";
            document.getElementById('profileTitle').innerText = `Мой профиль: ${myName}`;
            document.getElementById('profileLastSeen').innerText = "В сети";
            
            const res = await fetch(`https://kali.pythonanywhere.com/get_profile?username=${myName}`);
            const data = await res.json();
            
            document.getElementById('profileAbout').value = data.about_text;
            document.getElementById('profileAbout').disabled = false;
            document.getElementById('saveProfileBtn').classList.remove('hidden');
            switchWindow('profileWindow');
        }

        async function openTargetProfile() {
            previousWindow = "chatWindow";
            document.getElementById('profileTitle').innerText = `Профиль: ${activeChatUser}`;
            
            const res = await fetch(`https://kali.pythonanywhere.com/get_profile?username=${activeChatUser}`);
            const data = await res.json();
            
            document.getElementById('profileLastSeen').innerText = data.last_seen_str;
            document.getElementById('profileAbout').value = data.about_text;
            document.getElementById('profileAbout').disabled = true;
            document.getElementById('saveProfileBtn').classList.add('hidden');
            switchWindow('profileWindow');
        }

        async function saveProfile() {
            const text = document.getElementById('profileAbout').value;
            const res = await fetch('https://kali.pythonanywhere.com/update_profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: myName, about_text: text })
            });
            const data = await res.json();
            alert(data.message);
            closeProfile();
        }

        function closeProfile() {
            switchWindow(previousWindow);
        }

        window.addEventListener('beforeunload', function () {
            if (myName) {
                navigator.sendBeacon('https://kali.pythonanywhere.com/logout', JSON.stringify({ username: myName }));
            }
        });
    </script>
</body>
</html>
