<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>CyberEats Neon Lounge - Меню</title>
    <style>
        :root {
            --bg: #070709;
            --card-bg: #121216;
            --accent: #00f2ff;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --price-glow: rgba(0, 242, 255, 0.15);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* Шапка заведения */
        .header {
            background: linear-gradient(to bottom, #121216, var(--bg));
            padding: 25px 20px 15px 20px;
            text-align: center;
            border-bottom: 1px solid #1e1e24;
        }

        .header h1 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text-main);
        }
        
        .header h1 span {
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .header .address {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* Фиксированная горизонтальная лента категорий */
        .category-nav {
            position: sticky;
            top: 0;
            background: rgba(7, 7, 9, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 15px 20px;
            border-bottom: 1px solid #1e1e24;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .category-nav::-webkit-scrollbar {
            display: none; /* Прячем скроллбар для эстетики */
        }

        .category-btn {
            background: #1c1c24;
            color: var(--text-muted);
            border: 1px solid #2d2d3d;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.2s;
        }

        .category-btn.active {
            background: rgba(0, 242, 255, 0.1);
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        /* Контейнер меню */
        .menu-container {
            padding: 10px 20px 40px 20px;
        }

        .section-title {
            font-size: 1.3rem;
            color: var(--text-main);
            margin: 25px 0 15px 0;
            padding-left: 8px;
            border-left: 3px solid var(--accent);
            scroll-margin-top: 80px; /* Отступ при автоскролле */
        }

        /* Карточки блюд (Компактный мобильный вариант) */
        .menu-item {
            display: flex;
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid #1e1e24;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .item-img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .item-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 5px;
        }

        .item-name {
            font-size: 1rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-main);
        }

        .item-weight {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .item-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 5px 0 auto 0;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* Ограничиваем описание двумя строками */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-price {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--accent);
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><span>CyberEats</span> Neon Lounge</h1>
        <div class="address">📍 г. Астана, ул. Кабанбай Батыра, 53</div>
    </div>

    <div class="category-nav" id="categoryNav">
        <button class="category-btn active" onclick="scrollToSection('soups', this)">🍲 Супы</button>
        <button class="category-btn" onclick="scrollToSection('main', this)">🥩 Горячее</button>
        <button class="category-btn" onclick="scrollToSection('snacks', this)">🥗 Закуски</button>
        <button class="category-btn" onclick="scrollToSection('drinks', this)">🍹 Напитки</button>
    </div>

    <div class="menu-container" id="menuContainer">
        
        <div id="section-soups">
            <div class="section-title">Супы</div>
            <div id="items-soups"></div>
        </div>

        <div id="section-main">
            <div class="section-title">Вторые блюда</div>
            <div id="items-main"></div>
        </div>

        <div id="section-snacks">
            <div class="section-title">Закуски</div>
            <div id="items-snacks"></div>
        </div>

        <div id="section-drinks">
            <div class="section-title">Лимонады и напитки</div>
            <div id="items-drinks"></div>
        </div>

    </div>

    <script>
        // Имена секций для сопоставления с базой данных
        const categories = ['soups', 'main', 'snacks', 'drinks'];

        // Загружаем меню с нашего Flask-сервера
        async function loadMenu() {
            try {
                const res = await fetch('https://kali.pythonanywhere.com/api/menu');
                const data = await res.json();
                
                // Очищаем блоки перед рендером
                categories.forEach(cat => document.getElementById(`items-${cat}`).innerHTML = "");

                // Рендерим карточки
                data.forEach(item => {
                    const itemHtml = `
                        <div class="menu-item">
                            <img class="item-img" src="${item.image_url}" alt="${item.name}" loading="lazy">
                            <div class="item-info">
                                <div class="item-header">
                                    <h3 class="item-name">${item.name}</h3>
                                    <span class="item-weight">${item.weight}</span>
                                </div>
                                <p class="item-desc">${item.description}</p>
                                <div class="item-price">${item.price} ₸</div>
                            </div>
                        </div>
                    `;
                    
                    const targetBlock = document.getElementById(`items-${item.category}`);
                    if (targetBlock) {
                        targetBlock.insertAdjacentHTML('beforeend', itemHtml);
                    }
                });
            } catch (e) {
                console.error("Ошибка загрузки меню:", e);
                alert("Не удалось загрузить электронное меню. Проверьте интернет.");
            }
        }

        // Функция плавного скролла к нужной категории при клике на таб
        function scrollToSection(sectionId, btn) {
            // Снимаем активный класс со всех кнопок и вешаем на текущую
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const target = document.getElementById(`section-${sectionId}`);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Запуск при загрузке страницы
        window.onload = loadMenu;
    </script>
</body>
</html>
