<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Gourmet Lounge - Меню</title>
    <style>
        :root { --bg: #F9F6F0; --card-bg: #FFFFFF; --accent: #E05A33; --text-main: #332B29; --text-muted: #857874; }
        .modal-open { overflow: hidden !important; overscroll-behavior: none !important; }
        body { background-color: var(--bg); background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2h2v2h20v2H22v2.5h-2zm0 0H0v-2h20v2z' fill='%23e0d8cf' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E"); color: var(--text-main); font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; padding-bottom: 80px; overscroll-behavior-y: none; }
        .header { background: rgba(249, 246, 240, 0.95); backdrop-filter: blur(8px); padding: 20px 20px 15px 20px; text-align: center; border-bottom: 1px solid #EAE3D9; }
        .header h1 { margin: 0; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }
        .header h1 span { color: var(--accent); }
        .header .address { font-size: 0.85rem; color: var(--text-muted); margin-top: 5px; }
        .category-nav { position: sticky; top: 0; background: rgba(249, 246, 240, 0.95); backdrop-filter: blur(8px); z-index: 100; display: flex; gap: 12px; overflow-x: auto; padding: 12px 20px; border-bottom: 1px solid #EAE3D9; }
        .category-nav::-webkit-scrollbar { display: none; }
        .category-btn { background: #FFFFFF; color: var(--text-muted); border: 1px solid #EAE3D9; padding: 10px 20px; border-radius: 25px; font-size: 0.95rem; font-weight: 600; white-space: nowrap; cursor: pointer; transition: 0.3s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .category-btn.active { background: var(--accent); color: #FFFFFF; border-color: var(--accent); box-shadow: 0 4px 12px rgba(224, 90, 51, 0.3); }
        .menu-container { padding: 10px 20px; }
        .section-title { font-size: 1.4rem; font-weight: 800; margin: 35px 0 15px 0; padding-left: 12px; border-left: 4px solid var(--accent); scroll-margin-top: 80px; }
        .menu-item { display: flex; background: var(--card-bg); border-radius: 20px; overflow: hidden; margin-bottom: 18px; border: 1px solid #F0EBE1; box-shadow: 0 8px 20px rgba(0,0,0,0.04); position: relative; }
        .item-img { width: 125px; height: 125px; object-fit: cover; flex-shrink: 0; cursor: pointer; }
        .item-info { padding: 14px; display: flex; flex-direction: column; justify-content: space-between; flex-grow: 1; }
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
        .item-name { font-size: 1.05rem; font-weight: 700; margin: 0; line-height: 1.2; cursor: pointer; }
        .item-weight { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); background: #F4EFE7; padding: 3px 8px; border-radius: 8px; white-space: nowrap; }
        .item-desc { font-size: 0.85rem; color: var(--text-muted); margin: 6px 0 auto 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .item-price { font-size: 1.15rem; font-weight: 800; color: var(--accent); }
        .add-btn { background: #F4EFE7; color: var(--accent); border: none; width: 32px; height: 32px; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .add-btn:active { transform: scale(0.95); }
        .qty-control { display: flex; align-items: center; background: var(--accent); border-radius: 10px; overflow: hidden; color: white; }
        .qty-btn { background: none; border: none; color: white; width: 32px; height: 32px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .qty-val { font-weight: bold; font-size: 1rem; width: 20px; text-align: center; }
        .floating-cart { position: fixed; bottom: 20px; right: 20px; background: var(--accent); width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(224, 90, 51, 0.4); cursor: pointer; transition: 0.3s; z-index: 1000; display: none; }
        .floating-cart svg { width: 28px; fill: white; }
        .cart-badge { position: absolute; top: 0; right: 0; background: #332B29; color: white; font-size: 0.75rem; font-weight: bold; width: 22px; height: 22px; border-radius: 11px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg); }
        
        /* Модалки */
        .cart-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; display: none; flex-direction: column; justify-content: flex-end; }
        .cart-content { background: var(--card-bg); border-radius: 25px 25px 0 0; padding: 25px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease-out; position: relative; touch-action: pan-y; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cart-header h2 { margin: 0; font-size: 1.5rem; }
        .close-cart { background: #F4EFE7; border: none; width: 36px; height: 36px; border-radius: 18px; font-size: 1.2rem; color: var(--text-main); font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #F0EBE1; padding-bottom: 15px; }
        .cart-item-name { font-weight: 700; font-size: 1rem; margin-bottom: 5px; }
        .cart-item-price { color: var(--text-muted); font-size: 0.9rem; }
        
        .summary-box { background: #F9F6F0; border-radius: 15px; padding: 15px; margin-top: 20px; margin-bottom: 15px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; color: var(--text-muted); }
        .summary-row.total { border-top: 1px dashed #EAE3D9; margin-top: 10px; padding-top: 10px; font-size: 1.3rem; font-weight: 800; color: var(--text-main); }
        
        /* Стили для выбора столика */
        .table-selector-box { background: #F4EFE7; border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .table-selector-label { font-weight: 700; color: var(--text-main); }
        .table-select { background: var(--card-bg); border: 1px solid #EAE3D9; padding: 10px 15px; border-radius: 10px; font-size: 1rem; font-weight: bold; color: var(--accent); outline: none; }
        
        .order-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .order-btn:active { transform: scale(0.98); }

        /* Окно деталей */
        #itemDetailsModal { z-index: 3000; }
        .details-content { padding: 0; overflow: hidden; }
        .details-img-container { position: relative; width: 100%; height: 280px; }
        .details-img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .details-close-btn { position: absolute; top: 15px; right: 15px; z-index: 10; background: rgba(255, 255, 255, 0.9); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .details-info { padding: 25px; }
        .details-title-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 10px; }
        .details-title { margin: 0; font-size: 1.5rem; font-weight: 800; line-height: 1.2; }
        .details-desc { color: var(--text-muted); font-size: 1rem; line-height: 1.5; margin-bottom: 30px; }
        .details-footer { display: flex; justify-content: space-between; align-items: center; }
        .details-price { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <h1><span>Gourmet</span> Lounge</h1>
        <div class="address">📍 г. Астана, ул. Кабанбай Батыра, 53</div>
    </div>

    <div class="category-nav" id="categoryNav">
        <button class="category-btn active" onclick="scrollToSection('breakfasts', this)">🍳 Завтраки</button>
        <button class="category-btn" onclick="scrollToSection('salads', this)">🥗 Салаты</button>
        <button class="category-btn" onclick="scrollToSection('soups', this)">🍲 Супы</button>
        <button class="category-btn" onclick="scrollToSection('main', this)">🥩 Горячие блюда</button>
        <button class="category-btn" onclick="scrollToSection('pizza', this)">🍕 Пиццы</button>
        <button class="category-btn" onclick="scrollToSection('snacks', this)">🍟 Закуски</button>
        <button class="category-btn" onclick="scrollToSection('drinks', this)">🍹 Напитки</button>
    </div>

    <div class="menu-container" id="menuContainer">
        <div id="section-breakfasts"><div class="section-title">Завтраки</div><div id="items-breakfasts"></div></div>
        <div id="section-salads"><div class="section-title">Салаты</div><div id="items-salads"></div></div>
        <div id="section-soups"><div class="section-title">Супы</div><div id="items-soups"></div></div>
        <div id="section-main"><div class="section-title">Горячие блюда</div><div id="items-main"></div></div>
        <div id="section-pizza"><div class="section-title">Пиццы</div><div id="items-pizza"></div></div>
        <div id="section-snacks"><div class="section-title">Закуски</div><div id="items-snacks"></div></div>
        <div id="section-drinks"><div class="section-title">Лимонады и напитки</div><div id="items-drinks"></div></div>
    </div>

    <div class="floating-cart" id="floatingCart" onclick="toggleCart()">
        <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
        <div class="cart-badge" id="cartBadge">0</div>
    </div>

    <div class="cart-modal" id="cartModal" onclick="if(event.target === this) toggleCart()">
        <div class="cart-content" id="cartContent">
            <div class="cart-header">
                <h2>Ваш заказ</h2>
                <button class="close-cart" onclick="toggleCart()">✕</button>
            </div>
            <div id="cartItemsList"></div>
            
            <div class="summary-box">
                <div class="summary-row"><span>Подытог:</span><span id="subtotalPrice">0 ₸</span></div>
                <div class="summary-row"><span>Обслуживание (10%):</span><span id="servicePrice">0 ₸</span></div>
                <div class="summary-row total"><span>Итого:</span><span id="totalPrice">0 ₸</span></div>
            </div>

            <div class="table-selector-box">
                <span class="table-selector-label">Укажите ваш столик:</span>
                <select class="table-select" id="tableSelect">
                    <option value="" disabled selected>№</option>
                    <option value="1">Стол 1</option><option value="2">Стол 2</option><option value="3">Стол 3</option>
                    <option value="4">Стол 4</option><option value="5">Стол 5</option><option value="6">Стол 6</option>
                    <option value="7">Стол 7</option><option value="8">Стол 8</option><option value="9">Стол 9</option>
                    <option value="10">Стол 10</option><option value="11">Стол 11</option><option value="12">Стол 12</option>
                    <option value="13">Стол 13</option><option value="14">Стол 14</option><option value="15">Стол 15</option>
                </select>
            </div>
            
            <button class="order-btn" onclick="submitOrder()">Оформить заказ</button>
        </div>
    </div>

    <div class="cart-modal" id="itemDetailsModal" onclick="if(event.target === this) closeDetails()">
        <div class="cart-content details-content" id="detailsContent">
            <div class="details-img-container">
                <img id="detailsImg" class="details-img" src="" alt="">
                <button class="close-cart details-close-btn" onclick="closeDetails()">✕</button>
            </div>
            <div class="details-info">
                <div class="details-title-row">
                    <h2 id="detailsTitle" class="details-title">Название</h2>
                    <span id="detailsWeight" class="item-weight">0г</span>
                </div>
                <p id="detailsDesc" class="details-desc">Описание</p>
                <div class="details-footer">
                    <div id="detailsPrice" class="details-price">0 ₸</div>
                    <div id="detailsControls"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://kali.pythonanywhere.com/api';
        const categories = ['breakfasts', 'salads', 'soups', 'main', 'pizza', 'snacks', 'drinks'];
        let menuData = []; 
        let cart = {}; 
        let currentDetailsId = null; 

        async function loadMenu() {
            try {
                const res = await fetch(`${API_URL}/menu`);
                menuData = await res.json();
                renderMenu();
            } catch (e) { alert("Ошибка загрузки меню."); }
        }

        function renderMenu() {
            categories.forEach(cat => document.getElementById(`items-${cat}`).innerHTML = "");
            menuData.forEach(item => {
                const qty = cart[item.id] || 0;
                let btnHtml = qty === 0 
                    ? `<button class="add-btn" onclick="updateCart(${item.id}, 1); event.stopPropagation();">＋</button>`
                    : `<div class="qty-control" onclick="event.stopPropagation();">
                           <button class="qty-btn" onclick="updateCart(${item.id}, -1)">−</button>
                           <span class="qty-val">${qty}</span>
                           <button class="qty-btn" onclick="updateCart(${item.id}, 1)">＋</button>
                       </div>`;

                const itemHtml = `
                    <div class="menu-item">
                        <img class="item-img" src="${item.image_url}" loading="lazy" onclick="openDetails(${item.id})">
                        <div class="item-info">
                            <div class="item-header">
                                <h3 class="item-name" onclick="openDetails(${item.id})">${item.name}</h3>
                                <span class="item-weight">${item.weight}</span>
                            </div>
                            <p class="item-desc" onclick="openDetails(${item.id})">${item.description}</p>
                            <div class="price-row">
                                <div class="item-price">${item.price} ₸</div>
                                <div id="btn-container-${item.id}">${btnHtml}</div>
                            </div>
                        </div>
                    </div>
                `;
                const targetBlock = document.getElementById(`items-${item.category}`);
                if (targetBlock) targetBlock.insertAdjacentHTML('beforeend', itemHtml);
            });
        }

        function updateCart(id, delta) {
            if (!cart[id]) cart[id] = 0;
            cart[id] += delta;
            if (cart[id] <= 0) delete cart[id];
            renderMenu(); updateCartUI(); updateDetailsControls(); 
        }

        function updateCartUI() {
            let totalItems = 0; let subtotal = 0;
            const cartList = document.getElementById('cartItemsList');
            cartList.innerHTML = "";

            Object.keys(cart).forEach(id => {
                const item = menuData.find(m => m.id == id);
                const qty = cart[id];
                totalItems += qty; subtotal += item.price * qty;
                cartList.innerHTML += `
                    <div class="cart-item">
                        <div>
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price} ₸</div>
                        </div>
                        <div class="qty-control">
                            <button class="qty-btn" onclick="updateCart(${item.id}, -1)">−</button>
                            <span class="qty-val">${qty}</span>
                            <button class="qty-btn" onclick="updateCart(${item.id}, 1)">＋</button>
                        </div>
                    </div>
                `;
            });

            const service = Math.round(subtotal * 0.10);
            const total = subtotal + service;

            document.getElementById('subtotalPrice').innerText = `${subtotal} ₸`;
            document.getElementById('servicePrice').innerText = `${service} ₸`;
            document.getElementById('totalPrice').innerText = `${total} ₸`;

            const floatingCart = document.getElementById('floatingCart');
            if (totalItems > 0) {
                floatingCart.style.display = 'flex';
                document.getElementById('cartBadge').innerText = totalItems;
            } else {
                floatingCart.style.display = 'none';
                if (document.getElementById('cartModal').style.display === 'flex') { closeModalWithAnim('cartModal', 'cartContent'); }
            }
        }

        // ОТПРАВКА ЗАКАЗА НА СЕРВЕР
        async function submitOrder() {
            const tableSelect = document.getElementById('tableSelect');
            if (!tableSelect.value) {
                alert("Пожалуйста, выберите номер вашего столика!");
                return;
            }

            // Формируем список блюд
            const orderItems = [];
            let subtotal = 0;
            Object.keys(cart).forEach(id => {
                const item = menuData.find(m => m.id == id);
                const qty = cart[id];
                orderItems.push({ id: item.id, name: item.name, price: item.price, qty: qty });
                subtotal += item.price * qty;
            });

            const service = Math.round(subtotal * 0.10);
            const total = subtotal + service;

            const payload = {
                table_number: tableSelect.value,
                items: orderItems,
                total_price: total
            };

            try {
                const res = await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert('Ваш заказ отправлен! Ожидайте подтверждения от официанта.');
                    cart = {}; // Очищаем корзину
                    tableSelect.value = ""; // Сбрасываем столик
                    updateCartUI();
                    renderMenu();
                    closeModalWithAnim('cartModal', 'cartContent');
                }
            } catch (e) { alert("Ошибка отправки заказа. Проверьте интернет."); }
        }

        function lockScroll() { document.body.style.position = 'fixed'; document.body.style.top = `-${window.scrollY}px`; document.body.style.width = '100%'; }
        function unlockScroll() { const scrollY = document.body.style.top; document.body.style.position = ''; document.body.style.top = ''; document.body.style.width = ''; if (scrollY) { window.scrollTo(0, parseInt(scrollY) * -1); } }

        function toggleCart() {
            const modal = document.getElementById('cartModal');
            if (modal.style.display === 'flex') { closeModalWithAnim('cartModal', 'cartContent'); } 
            else { modal.style.display = 'flex'; document.getElementById('cartContent').style.transform = ''; lockScroll(); }
        }

        function openDetails(id) {
            currentDetailsId = id; const item = menuData.find(m => m.id === id);
            document.getElementById('detailsImg').src = item.image_url;
            document.getElementById('detailsTitle').innerText = item.name;
            document.getElementById('detailsWeight').innerText = item.weight;
            document.getElementById('detailsDesc').innerText = item.description;
            document.getElementById('detailsPrice').innerText = item.price + ' ₸';
            updateDetailsControls();
            document.getElementById('itemDetailsModal').style.display = 'flex'; document.getElementById('detailsContent').style.transform = ''; lockScroll();
        }

        function closeDetails() { closeModalWithAnim('itemDetailsModal', 'detailsContent'); currentDetailsId = null; }

        function closeModalWithAnim(modalId, contentId) {
            const content = document.getElementById(contentId);
            content.style.transition = 'transform 0.3s ease-in'; content.style.transform = 'translateY(100%)'; unlockScroll();
            setTimeout(() => { document.getElementById(modalId).style.display = 'none'; content.style.transition = ''; }, 300);
        }

        function updateDetailsControls() {
            if (currentDetailsId === null) return;
            const id = currentDetailsId; const qty = cart[id] || 0; const container = document.getElementById('detailsControls');
            if (qty === 0) { container.innerHTML = `<button class="order-btn" style="margin-top: 0; padding: 12px 24px; width: auto;" onclick="updateCart(${id}, 1)">＋ В корзину</button>`; } 
            else { container.innerHTML = `<div class="qty-control" style="transform: scale(1.1); transform-origin: right center;"><button class="qty-btn" onclick="updateCart(${id}, -1)">−</button><span class="qty-val">${qty}</span><button class="qty-btn" onclick="updateCart(${id}, 1)">＋</button></div>`; }
        }

        function scrollToSection(sectionId, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const target = document.getElementById(`section-${sectionId}`); if (target) { target.scrollIntoView({ behavior: 'smooth' }); }
        }

        document.getElementById('cartModal').addEventListener('touchmove', e => { if (e.target === document.getElementById('cartModal')) { if (e.cancelable) e.preventDefault(); } }, {passive: false});
        document.getElementById('itemDetailsModal').addEventListener('touchmove', e => { if (e.target === document.getElementById('itemDetailsModal')) { if (e.cancelable) e.preventDefault(); } }, {passive: false});

        function makeSwipeable(modalId, contentId, closeFunc) {
            const content = document.getElementById(contentId);
            let startY = 0; let currentY = 0; let isDragging = false;
            content.addEventListener('touchstart', e => { if (content.scrollTop > 0) return; startY = e.touches[0].clientY; isDragging = true; content.style.transition = 'none'; }, {passive: true});
            content.addEventListener('touchmove', e => {
                if (!isDragging) return; currentY = e.touches[0].clientY; const deltaY = currentY - startY;
                if (deltaY > 0 && content.scrollTop <= 0) { if (e.cancelable) e.preventDefault(); content.style.transform = `translateY(${deltaY}px)`; }
            }, {passive: false});
            content.addEventListener('touchend', e => {
                if (!isDragging) return; isDragging = false; const deltaY = currentY - startY; content.style.transition = 'transform 0.3s ease-out';
                if (deltaY > 100 && content.scrollTop <= 0) { closeFunc(); } else { content.style.transform = ''; }
            });
        }

        window.onload = () => { loadMenu(); makeSwipeable('itemDetailsModal', 'detailsContent', closeDetails); makeSwipeable('cartModal', 'cartContent', toggleCart); };
    </script>
</body>
</html>
