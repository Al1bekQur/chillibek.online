<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Gourmet Lounge - Меню</title>
    <style>
        :root {
            --bg: #F9F6F0; /* Мягкий бежевый фон */
            --card-bg: #FFFFFF; /* Чистые белые карточки */
            --accent: #E05A33; /* Вкусный терракотовый/оранжевый акцент */
            --text-main: #332B29; /* Темно-коричневый текст, приятный для глаз */
            --text-muted: #857874; /* Серый текст для описаний */
        }

        body {
            background-color: var(--bg);
            /* Паттерн: мелкие прозрачные крестики/орнамент на фоне */
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2h2v2h20v2H22v2.5h-2zm0 0H0v-2h20v2z' fill='%23e0d8cf' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E");
            color: var(--text-main);
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* Шапка заведения */
        .header {
            background: rgba(249, 246, 240, 0.95);
            backdrop-filter: blur(8px);
            padding: 20px 20px 15px 20px;
            text-align: center;
            border-bottom: 1px solid #EAE3D9;
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }
        
        .header h1 span {
            color: var(--accent);
        }

        .header .address {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* Фиксированная горизонтальная лента категорий */
        .category-nav {
            position: sticky;
            top: 0;
            background: rgba(249, 246, 240, 0.95);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 12px 20px;
            border-bottom: 1px solid #EAE3D9;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .category-nav::-webkit-scrollbar {
            display: none; 
        }

        .category-btn {
            background: #FFFFFF;
            color: var(--text-muted);
            border: 1px solid #EAE3D9;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .category-btn.active {
            background: var(--accent);
            color: #FFFFFF;
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(224, 90, 51, 0.3);
        }

        /* Контейнер меню */
        .menu-container {
            padding: 10px 20px 40px 20px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-main);
            margin: 35px 0 15px 0;
            padding-left: 12px;
            border-left: 4px solid var(--accent);
            scroll-margin-top: 80px; 
        }

        /* Карточки блюд */
        .menu-item {
            display: flex;
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 18px;
            border: 1px solid #F0EBE1;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
        }

        .item-img {
            width: 125px;
            height: 125px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .item-info {
            padding: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .item-name {
            font-size: 1.05rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-main);
            line-height: 1.2;
        }

        .item-weight {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            background: #F4EFE7;
            padding: 3px 8px;
            border-radius: 8px;
            white-space: nowrap;
        }

        .item-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 6px 0 auto 0;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-price {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--accent);
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><span>Gourmet</span> Lounge</h1>
        <div class="address">📍 г. Астана, ул. Кабанбай Батыра, 53</div>
    </div>

    <div class="category-nav" id="categoryNav">
        <button class="category-btn active" onclick="scrollToSection('soups', this)">🍲 Супы</button>
        <button class="category-btn" onclick="scrollToSection('main', this)">🥩 Горячее</button>
        <button class="category-btn" onclick="scrollToSection('snacks', this)">🥗 Закуски</button>
        <button class="category-btn" onclick="scrollToSection('drinks', this)">🍹 Напитки</button>
    </div>

    <div class="menu-container" id="menuContainer">
        
        <div id="section-soups">
            <div class="section-title">Супы</div>
            <div id="items-soups"></div>
        </div>

        <div id="section-main">
            <div class="section-title">Вторые блюда</div>
            <div id="items-main"></div>
        </div>

        <div id="section-snacks">
            <div class="section-title">Закуски</div>
            <div id="items-snacks"></div>
        </div>

        <div id="section-drinks">
            <div class="section-title">Лимонады и напитки</div>
            <div id="items-drinks"></div>
        </div>

    </div>

    <script>
        const categories = ['soups', 'main', 'snacks', 'drinks'];

        async function loadMenu() {
            try {
                const res = await fetch('https://kali.pythonanywhere.com/api/menu');
                const data = await res.json();
                
                categories.forEach(cat => document.getElementById(`items-${cat}`).innerHTML = "");

                data.forEach(item => {
                    const itemHtml = `
                        <div class="menu-item">
                            <img class="item-img" src="${item.image_url}" alt="${item.name}" loading="lazy">
                            <div class="item-info">
                                <div class="item-header">
                                    <h3 class="item-name">${item.name}</h3>
                                    <span class="item-weight">${item.weight}</span>
                                </div>
                                <p class="item-desc">${item.description}</p>
                                <div class="item-price">${item.price} ₸</div>
                            </div>
                        </div>
                    `;
                    
                    const targetBlock = document.getElementById(`items-${item.category}`);
                    if (targetBlock) {
                        targetBlock.insertAdjacentHTML('beforeend', itemHtml);
                    }
                });
            } catch (e) {
                console.error("Ошибка загрузки меню:", e);
                alert("Не удалось загрузить электронное меню. Проверьте подключение к интернету.");
            }
        }

        function scrollToSection(sectionId, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const target = document.getElementById(`section-${sectionId}`);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth' });
            }
        }

        window.onload = loadMenu;
    </script>
</body>
</html>
